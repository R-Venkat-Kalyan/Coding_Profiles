<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Coding Profiles</title>
    <link rel="icon" type="image/x-icon" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: #121212;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            margin: 0;
            color: white;
            padding-top: 20px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 30px;
            text-align: center;
            color: #FFD700;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            justify-content: center;
            align-items: center;
            width: 80%;
        }

        .card {
            background-color: #212121;
            border-radius: 15px;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.3);
            text-align: center;
            padding: 30px;
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
        }

        .card:nth-child(1) img,
        .card:nth-child(2) img {
            border-radius: 50%;
        }

        .card a {
            text-decoration: none;
            color: #FFD700;
            font-weight: bold;
            font-size: 1.2em;
        }

        .card-title {
            margin-top: 10px;
            color: #DDD;
        }

        @media only screen and (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .container {
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            }

            .card {
                padding: 20px;
            }
        }

        @media only screen and (max-width: 480px) {
            h1 {
                font-size: 1.5em;
            }

            .container {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            }

            .card {
                padding: 15px;
            }

            .card img {
                width: 60px;
                height: 60px;
                margin-bottom: 15px;
            }

            .card a {
                font-size: 1em;
            }

            .card-title {
                font-size: 0.9em;
            }
        }
    </style>
</head>

<body>

    <h1>Explore My Coding Profiles</h1>

    <div class="container">
        <div class="card">
            <a href="https://www.codechef.com/users/klu_2100030959" target="_blank">
                <img src="codechef.png" alt="CodeChef Icon">
                <div class="card-title">CodeChef</div>
            </a>
        </div>

        <div class="card">
            <a href="https://codeforces.com/profile/Kalyan_2100030959" target="_blank">
                <img src="codeforces.png" alt="Codeforces Icon">
                <div class="card-title">Codeforces</div>
            </a>
        </div>

        <div class="card">
            <a href="https://leetcode.com/u/Reddy_Venkat_Kalyan/" target="_blank">
                <img src="https://upload.wikimedia.org/wikipedia/commons/1/19/LeetCode_logo_black.png"
                    alt="LeetCode Icon">
                <div class="card-title">LeetCode</div>
            </a>
        </div>

        <div class="card">
            <a href="https://www.hackerrank.com/profile/2100030959_Rvk" target="_blank">
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/65/HackerRank_logo.png"
                    alt="HackerRank Icon">
                <div class="card-title">HackerRank</div>
            </a>
        </div>

        <div class="card">
            <a href="https://www.stopstalk.com/user/profile/Kalyan_959" target="_blank">
                <img src="Stalk.png" alt="StopStalk Icon" style="border-radius: 50%;">
                <div class="card-title">StopStalk</div>
            </a>
        </div>
    </div>

</body>

</html>
