<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Coding Profiles</title>
    <link rel="icon" type="image/x-icon" href="favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: #121212; /* Dark background color */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: white;
        }
        h1 {
            font-size: 2.5em; /* Decreased heading font size */
            margin-bottom: 30px; /* Increased margin */
            text-align: center; /* Centered heading */
            color: #FFD700; /* Golden color for heading */
        }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            justify-content: center;
            align-items: center;
            width: 80%;
        }
        .card {
            background-color: #212121; /* Darker card background color */
            border-radius: 15px; /* Increased border radius */
            box-shadow: 0 6px 12px rgba(0,0,0,0.3); /* Enhanced box shadow */
            text-align: center;
            padding: 30px; /* Increased padding */
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .card:hover {
            transform: scale(1.05);
        }
        .card img {
            width: 80px; /* Increased icon size */
            height: 80px; /* Increased icon size */
            margin-bottom: 20px; /* Increased margin */
        }
        /* Circular border for the first two images */
        .card:nth-child(1) img, .card:nth-child(2) img {
            border-radius: 50%;
        }
        .card a {
            text-decoration: none;
            color: #FFD700; /* Golden color for links */
            font-weight: bold; /* Bold text for links */
            font-size: 1.2em; /* Increased font size */
        }
        .card-title {
            margin-top: 10px; /* Increased margin */
            color: #DDD; /* Lighter text color */
        }
    </style>
</head>
<body>

<h1>Explore My Coding Profiles</h1>

<div class="container">
    <div class="card">
        <a href="https://www.codechef.com/users/klu_2100030959" target="_blank">
            <img src="codechef.png" alt="CodeChef Icon">
            <div class="card-title">CodeChef</div>
        </a>
    </div>
    
    <div class="card">
        <a href="https://codeforces.com/profile/Kalyan_2100030959" target="_blank">
            <img src="codeforces.png" alt="Codeforces Icon">
            <div class="card-title">Codeforces</div>
        </a>
    </div>

    <div class="card">
        <a href="https://leetcode.com/u/Reddy_Venkat_Kalyan/" target="_blank">
            <img src="https://upload.wikimedia.org/wikipedia/commons/1/19/LeetCode_logo_black.png" alt="LeetCode Icon">
            <div class="card-title">LeetCode</div>
        </a>
    </div>

    <div class="card">
        <a href="https://www.hackerrank.com/profile/2100030959_Rvk" target="_blank">
            <img src="https://upload.wikimedia.org/wikipedia/commons/6/65/HackerRank_logo.png" alt="HackerRank Icon">
            <div class="card-title">HackerRank</div>
        </a>
    </div>

    

    <div class="card">
        <a href="https://www.stopstalk.com/user/profile/Kalyan_959" target="_blank">
            <img src="Stalk.png" alt="StopStalk Icon" style="border-radius: 50%;">
            <div class="card-title">StopStalk</div>
        </a>
    </div>
</div>

</body>
</html>
